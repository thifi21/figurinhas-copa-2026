name: Keep Supabase Awake

on:
  schedule:
    # Runs everyday at 10:00 UTC to prevent Supabase from pausing due to inactivity
    - cron: '0 10 * * *'
  workflow_dispatch: # Allows manual triggering from the GitHub Actions tab

